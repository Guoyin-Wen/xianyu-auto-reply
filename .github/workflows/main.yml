name: Sync Upstream

# 定时从上游仓库 zhinianboke/xianyu-auto-reply 同步更新到本 fork
on:
  schedule:
    - cron: "17 */6 * * *"   # 每 6 小时同步一次（时间为 UTC）
  workflow_dispatch:          # 也支持在 Actions 页面手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 目标分支
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0          # 完整历史，保证 merge 有共同祖先
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Upstream Sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
        with:
          target_sync_branch: main
          upstream_sync_repo: zhinianboke/xianyu-auto-reply
          upstream_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
